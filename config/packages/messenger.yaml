framework:
    messenger:
        failure_transport: failed

        transports:
            async: '%env(MESSENGER_TRANSPORT_DSN)%'
            failed: 'doctrine://default?queue_name=failed'

        routing:
            App\Application\Lead\Exporter\Message\ExportLeadMessage: async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
